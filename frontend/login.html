<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auth | Career AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      font-family: 'Outfit', sans-serif;
      background: radial-gradient(circle at top right, #1e293b, #0f172a);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      overflow: hidden;
    }

    .auth-container {
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 40px;
      border-radius: 24px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .auth-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .auth-header h2 {
      font-size: 2rem;
      font-weight: 600;
      margin: 0;
      background: linear-gradient(to right, #60a5fa, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .auth-header p {
      color: #94a3b8;
      margin-top: 8px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #cbd5e1;
      font-size: 0.9rem;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: white;
      transition: all 0.3s ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: #60a5fa;
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.1);
    }

    .auth-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(to right, #2563eb, #7c3aed);
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 10px;
    }

    .auth-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.4);
    }

    .auth-btn:active {
      transform: translateY(0);
    }

    .toggle-btn {
      text-align: center;
      margin-top: 24px;
      color: #94a3b8;
      font-size: 0.9rem;
    }

    .toggle-btn span {
      color: #60a5fa;
      cursor: pointer;
      font-weight: 600;
    }

    .toggle-btn span:hover {
      text-decoration: underline;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

  <div class="auth-container">
    <!-- LOGIN FORM -->
    <div id="loginForm">
      <div class="auth-header">
        <h2>Welcome Back</h2>
        <p>Ready to continue your journey?</p>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="loginEmail" placeholder="name@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••">
      </div>
      <button class="auth-btn" onclick="handleLogin()">Sign In</button>
      <div class="toggle-btn">
        Don't have an account? <span onclick="toggleAuth()">Create one</span>
      </div>
    </div>

    <!-- REGISTER FORM -->
    <div id="registerForm" class="hidden">
      <div class="auth-header">
        <h2>Create Account</h2>
        <p>Join Career AI today</p>
      </div>
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="regName" placeholder="John Doe">
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="regEmail" placeholder="name@example.com">
      </div>
      <div class="form-group">
        <label>Date of Birth</label>
        <input type="text" id="regDob" placeholder="DD-MM-YYYY">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="regPassword" placeholder="••••••••">
      </div>
      <button class="auth-btn" onclick="handleRegister()">Get Started</button>
      <div class="toggle-btn">
        Already have an account? <span onclick="toggleAuth()">Log in</span>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    function toggleAuth() {
      document.getElementById('loginForm').classList.toggle('hidden');
      document.getElementById('registerForm').classList.toggle('hidden');
    }

    async function handleLogin() {
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;

      if (!email || !password) return alert("Please fill all fields");

      const res = await api("/auth/login", "POST", { email, password });

      if (res.user_id) {
        localStorage.setItem("user_id", res.user_id);
        window.location.href = "index.html";
      } else {
        alert(res.error || "Login failed");
      }
    }

    async function handleRegister() {
      const name = document.getElementById('regName').value;
      const email = document.getElementById('regEmail').value;
      const dob = document.getElementById('regDob').value;
      const password = document.getElementById('regPassword').value;

      if (!name || !email || !password) return alert("Please fill all fields");

      const res = await api("/auth/register", "POST", {
        name,
        email,
        date_of_birth: dob,
        password,
        gender: "Not specified"
      });

      if (res.user_id) {
        localStorage.setItem("user_id", res.user_id);
        window.location.href = "profile-setup.html";
      } else {
        alert(res.error || "Registration failed");
      }
    }
  </script>

</body>

</html>
