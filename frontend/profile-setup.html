<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career AI — Profile Setup</title>
    <meta name="description"
        content="Set up your student profile to receive personalized career guidance from Career AI.">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            min-height: 100vh;
            background: var(--bg-void);
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
        }

        .bg-orbs {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.12;
        }

        .orb-1 {
            width: 600px;
            height: 600px;
            top: -200px;
            right: -150px;
            background: #6366f1;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            bottom: -100px;
            left: -100px;
            background: #8b5cf6;
        }

        .setup-card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 680px;
            padding: 44px 48px;
            animation: fadeUp 0.5s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Progress indicator */
        .setup-progress {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 32px;
        }

        .prog-step {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 600;
            border: 2px solid var(--border);
            color: var(--text-3);
            transition: var(--transition);
        }

        .prog-step.done {
            background: var(--success);
            border-color: var(--success);
            color: #fff;
        }

        .prog-step.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
        }

        .prog-line {
            flex: 1;
            height: 2px;
            background: var(--border);
            border-radius: 99px;
        }

        .prog-line.done {
            background: var(--success);
        }

        .setup-header {
            margin-bottom: 32px;
        }

        .setup-header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .setup-header p {
            color: var(--text-2);
            font-size: 0.95rem;
        }

        /* Sections */
        .form-section {
            background: var(--bg-glass2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 16px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
        }

        .col-span-2 {
            grid-column: span 2;
        }

        .col-span-3 {
            grid-column: span 3;
        }

        /* Skills pills input */
        .skills-input-area {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            min-height: 46px;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: text;
            transition: var(--transition);
        }

        .skills-input-area:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        .skill-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 3px 10px;
            background: rgba(99, 102, 241, 0.2);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 99px;
            font-size: 0.82rem;
            color: #a5b4fc;
        }

        .skill-pill button {
            background: none;
            border: none;
            cursor: pointer;
            color: #a5b4fc;
            font-size: 0.9rem;
            line-height: 1;
            padding: 0;
        }

        .skill-pill button:hover {
            color: #f87171;
        }

        #skillInput {
            border: none;
            background: none;
            color: var(--text-1);
            font-family: var(--font);
            font-size: 0.9rem;
            outline: none;
            min-width: 120px;
            flex: 1;
        }

        #skillInput::placeholder {
            color: var(--text-3);
        }

        /* Submit */
        .submit-area {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 28px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
        }

        .submit-area .hint {
            font-size: 0.82rem;
            color: var(--text-3);
        }

        #submitBtn {
            min-width: 180px;
            padding: 14px 28px;
            font-size: 1rem;
        }
    </style>
</head>

<body>
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="setup-card glass-card">
        <!-- Progress -->
        <div class="setup-progress">
            <div class="prog-step done">✓</div>
            <div class="prog-line done"></div>
            <div class="prog-step active">2</div>
            <div class="prog-line"></div>
            <div class="prog-step">3</div>
        </div>

        <div class="setup-header">
            <h1>Complete Your Profile <span class="grad-text">✦</span></h1>
            <p>Help us understand you better to provide personalized career guidance</p>
        </div>

        <!-- Section 1: Academic Background -->
        <div class="form-section">
            <div class="section-title">📚 Academic Background</div>
            <div class="grid-3">
                <div class="form-group">
                    <label for="education_level">Education Level</label>
                    <select id="education_level" class="input-field">
                        <option value="School">School (10th / 12th)</option>
                        <option value="College">College / UG</option>
                        <option value="Graduate">Postgraduate</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="class_or_degree">Class / Degree</label>
                    <input id="class_or_degree" class="input-field" type="text" placeholder="e.g. 12th Std, B.E">
                </div>
                <div class="form-group">
                    <label for="stream">Stream / Branch</label>
                    <input id="stream" class="input-field" type="text" placeholder="e.g. Science, CSE">
                </div>
                <div class="form-group">
                    <label for="marks">Current Marks (%)</label>
                    <input id="marks" class="input-field" type="number" step="0.01" min="0" max="100"
                        placeholder="e.g. 85.5" required>
                </div>
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" class="input-field">
                        <option value="General">General</option>
                        <option value="OBC">OBC</option>
                        <option value="SC">SC</option>
                        <option value="ST">ST</option>
                        <option value="EWS">EWS</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="budget_lpa">Max Budget (LPA)</label>
                    <input id="budget_lpa" class="input-field" type="number" step="0.5" min="0" placeholder="e.g. 5.0">
                </div>
            </div>
        </div>

        <!-- Section 2: Interests & Goals -->
        <div class="form-section">
            <div class="section-title">🎯 Interests & Career Goals</div>
            <div class="grid-2">
                <div class="form-group">
                    <label for="interest_area">Primary Interest Area</label>
                    <input id="interest_area" class="input-field" type="text"
                        placeholder="e.g. Artificial Intelligence, Medicine">
                </div>
                <div class="form-group">
                    <label for="location_preference">Location Preference</label>
                    <input id="location_preference" class="input-field" type="text"
                        placeholder="e.g. Tamil Nadu, Bangalore">
                </div>
                <div class="form-group col-span-2">
                    <label for="career_goal">Career Goal</label>
                    <textarea id="career_goal" class="input-field" rows="2"
                        placeholder="Describe your dream career or what you want to achieve..."
                        style="resize:vertical;"></textarea>
                </div>
            </div>
        </div>

        <!-- Section 3: Skills -->
        <div class="form-section">
            <div class="section-title">🛠️ Current Skills</div>
            <div class="form-group">
                <label>Add your skills (press Enter or comma to add)</label>
                <div class="skills-input-area" id="skillsContainer"
                    onclick="document.getElementById('skillInput').focus()">
                    <input id="skillInput" type="text" placeholder="e.g. Python, Problem Solving...">
                </div>
                <input type="hidden" id="skills_hidden">
            </div>
        </div>

        <!-- Submit -->
        <div class="submit-area">
            <span class="hint">🔒 Your data is encrypted and private</span>
            <button id="submitBtn" class="btn-primary" onclick="saveProfile()">
                Complete Setup →
            </button>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        const userId = localStorage.getItem("user_id");
        if (!userId) window.location.href = "login.html";

        // Skills pill management
        const skillsSet = new Set();
        const skillInput = document.getElementById("skillInput");
        const skillsContainer = document.getElementById("skillsContainer");

        function addSkill(name) {
            name = name.trim();
            if (!name || skillsSet.has(name.toLowerCase())) return;
            skillsSet.add(name.toLowerCase());

            const pill = document.createElement("div");
            pill.className = "skill-pill";
            pill.innerHTML = `${name} <button onclick="removeSkill(this, '${name.toLowerCase()}')" type="button">×</button>`;
            skillsContainer.insertBefore(pill, skillInput);
            updateHiddenInput();
        }

        function removeSkill(btn, name) {
            skillsSet.delete(name);
            btn.parentElement.remove();
            updateHiddenInput();
        }

        function updateHiddenInput() {
            document.getElementById("skills_hidden").value = [...skillsSet].join(",");
        }

        skillInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter" || e.key === ",") {
                e.preventDefault();
                addSkill(skillInput.value.replace(",", ""));
                skillInput.value = "";
            }
        });

        // Check if profile already exists
        async function checkExistingProfile() {
            try {
                const res = await api(`/profile/${userId}`);
                if (res && !res.error) {
                    window.location.href = "index.html";
                }
            } catch (e) {
                console.warn("Profile check skipped:", e);
            }
        }
        checkExistingProfile();

        async function saveProfile() {
            const marks = document.getElementById("marks").value;
            if (!marks) {
                showToast("Please enter your current marks.", "error");
                return;
            }

            const btn = document.getElementById("submitBtn");
            btn.textContent = "Saving...";
            btn.disabled = true;

            const data = {
                education_level: document.getElementById("education_level").value,
                class_or_degree: document.getElementById("class_or_degree").value,
                stream: document.getElementById("stream").value,
                marks: parseFloat(marks),
                category: document.getElementById("category").value,
                interest_area: document.getElementById("interest_area").value,
                location_preference: document.getElementById("location_preference").value,
                career_goal: document.getElementById("career_goal").value,
                budget_lpa: parseFloat(document.getElementById("budget_lpa").value) || null,
                skills: document.getElementById("skills_hidden").value,
            };

            try {
                const res = await api(`/profile/setup/${userId}`, "POST", data);
                if (res && res.message) {
                    localStorage.setItem("profile_setup", "true");
                    showToast("Profile saved! Redirecting...", "success");
                    setTimeout(() => window.location.href = "index.html", 1200);
                } else {
                    showToast(res.error || "Failed to save profile. Check server.", "error");
                    btn.textContent = "Complete Setup →";
                    btn.disabled = false;
                }
            } catch (err) {
                showToast("Network error. Make sure the backend is running.", "error");
                btn.textContent = "Complete Setup →";
                btn.disabled = false;
            }
        }

        function showToast(msg, type = "info") {
            const toast = document.createElement("div");
            toast.className = `toast toast-${type}`;
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
</body>

</html>
