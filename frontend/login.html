<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Career AI — Sign In</title>
  <meta name="description"
    content="Sign in to Career Guidance AI for personalized career advice powered by artificial intelligence.">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-void);
      overflow: hidden;
      position: relative;
    }

    /* Animated background */
    .bg-orbs {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      animation: float 8s ease-in-out infinite;
    }

    .orb-1 {
      width: 500px;
      height: 500px;
      top: -150px;
      right: -100px;
      background: #6366f1;
      animation-delay: 0s;
    }

    .orb-2 {
      width: 400px;
      height: 400px;
      bottom: -100px;
      left: -100px;
      background: #8b5cf6;
      animation-delay: 2s;
    }

    .orb-3 {
      width: 300px;
      height: 300px;
      top: 50%;
      left: 50%;
      background: #06b6d4;
      animation-delay: 4s;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0) scale(1);
      }

      50% {
        transform: translateY(-30px) scale(1.05);
      }
    }

    /* Card */
    .auth-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 44px 40px;
      animation: fadeUp 0.5s ease;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Header */
    .brand {
      text-align: center;
      margin-bottom: 36px;
    }

    .brand-logo {
      width: 52px;
      height: 52px;
      background: var(--grad-main);
      border-radius: var(--radius);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      margin-bottom: 16px;
      box-shadow: var(--shadow-acc);
    }

    .brand h1 {
      font-size: 1.6rem;
      font-weight: 700;
    }

    .brand p {
      color: var(--text-2);
      font-size: 0.9rem;
      margin-top: 6px;
    }

    /* Tabs */
    .auth-tabs {
      display: flex;
      background: rgba(255, 255, 255, 0.04);
      border-radius: var(--radius-sm);
      padding: 4px;
      margin-bottom: 28px;
      border: 1px solid var(--border);
    }

    .auth-tab {
      flex: 1;
      padding: 9px;
      text-align: center;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-2);
      border-radius: calc(var(--radius-sm) - 2px);
      cursor: pointer;
      transition: var(--transition);
      border: none;
      background: transparent;
      font-family: var(--font);
    }

    .auth-tab.active {
      background: var(--accent);
      color: #fff;
      box-shadow: var(--shadow-acc);
    }

    /* Forms */
    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .auth-form.hidden {
      display: none;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper .icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1rem;
      pointer-events: none;
      color: var(--text-3);
    }

    .input-wrapper .input-field {
      padding-left: 40px;
    }

    /* Password toggle */
    .eye-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-3);
      font-size: 1rem;
      transition: var(--transition);
    }

    .eye-btn:hover {
      color: var(--text-1);
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      margin-top: 4px;
      font-size: 1rem;
    }

    .divider {
      text-align: center;
      color: var(--text-3);
      font-size: 0.8rem;
      position: relative;
      margin: 4px 0;
    }

    .divider::before,
    .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 42%;
      height: 1px;
      background: var(--border);
    }

    .divider::before {
      left: 0;
    }

    .divider::after {
      right: 0;
    }

    /* Error */
    .error-msg {
      color: #f87171;
      font-size: 0.82rem;
      display: none;
      padding: 10px 14px;
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: var(--radius-sm);
    }

    .error-msg.show {
      display: block;
    }

    .footer-note {
      text-align: center;
      margin-top: 24px;
      color: var(--text-3);
      font-size: 0.78rem;
    }
  </style>
</head>

<body>

  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="auth-card glass-card">
    <div class="brand">
      <div class="brand-logo">🎯</div>
      <h1 class="grad-text">Career AI</h1>
      <p>Your intelligent career guidance companion</p>
    </div>

    <!-- Tabs -->
    <div class="auth-tabs" role="tablist">
      <button id="tabLogin" class="auth-tab active" onclick="switchTab('login')">Sign In</button>
      <button id="tabRegister" class="auth-tab" onclick="switchTab('register')">Create Account</button>
    </div>

    <!-- Error -->
    <div id="errorMsg" class="error-msg"></div>

    <!-- Login Form -->
    <form id="loginForm" class="auth-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="loginEmail">Email Address</label>
        <div class="input-wrapper">
          <span class="icon">✉️</span>
          <input id="loginEmail" class="input-field" type="email" placeholder="name@example.com" required
            autocomplete="email">
        </div>
      </div>
      <div class="form-group">
        <div style="display: flex; justify-content: space-between; align-items: baseline;">
          <label for="loginPassword">Password</label>
          <a href="#" onclick="showForgot(true)"
            style="font-size: 0.75rem; color: var(--accent); text-decoration: none;">Forgot?</a>
        </div>
        <div class="input-wrapper">
          <span class="icon">🔒</span>
          <input id="loginPassword" class="input-field" type="password" placeholder="••••••••" required
            autocomplete="current-password">
          <button type="button" class="eye-btn" onclick="togglePwd('loginPassword',this)">👁️</button>
        </div>
      </div>
      <button type="submit" id="loginBtn" class="btn-primary submit-btn">Sign In →</button>
    </form>

    <!-- Forgot Password Form (Hidden) -->
    <form id="forgotForm" class="auth-form hidden" onsubmit="handleForgot(event)">
      <div class="brand" style="margin-bottom: 20px;">
        <h2 style="font-size: 1.2rem;">Reset Password</h2>
        <p>Enter your email and new password</p>
      </div>
      <div class="form-group">
        <label for="forgotEmail">Email Address</label>
        <input id="forgotEmail" class="input-field" type="email" placeholder="name@example.com" required>
      </div>
      <div class="form-group">
        <label for="forgotNewPassword">New Password</label>
        <div class="input-wrapper">
          <span class="icon">🔒</span>
          <input id="forgotNewPassword" class="input-field" type="password" placeholder="Min 6 characters" required
            minlength="6">
        </div>
      </div>
      <div style="display: flex; gap: 10px;">
        <button type="button" class="btn-secondary" style="flex: 1;" onclick="showForgot(false)">Cancel</button>
        <button type="submit" id="forgotBtn" class="btn-primary" style="flex: 2;">Reset Password</button>
      </div>
    </form>

    <!-- Register Form -->
    <form id="registerForm" class="auth-form hidden" onsubmit="handleRegister(event)">
      <div class="form-row">
        <div class="form-group">
          <label for="regName">Full Name</label>
          <input id="regName" class="input-field" type="text" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label for="regDob">Date of Birth</label>
          <input id="regDob" class="input-field" type="text" placeholder="DD-MM-YYYY">
        </div>
      </div>
      <div class="form-group">
        <label for="regEmail">Email Address</label>
        <div class="input-wrapper">
          <span class="icon">✉️</span>
          <input id="regEmail" class="input-field" type="email" placeholder="name@example.com" required
            autocomplete="email">
        </div>
      </div>
      <div class="form-group">
        <label for="regPassword">Password</label>
        <div class="input-wrapper">
          <span class="icon">🔒</span>
          <input id="regPassword" class="input-field" type="password" placeholder="Min 6 characters" required
            minlength="6" autocomplete="new-password">
          <button type="button" class="eye-btn" onclick="togglePwd('regPassword',this)">👁️</button>
        </div>
      </div>
      <button type="submit" id="registerBtn" class="btn-primary submit-btn">Create Account →</button>
    </form>

    <p class="footer-note">🔒 Your data is private and secure</p>
  </div>

  <script src="js/api.js"></script>
  <script>
    // Check if already logged in
    if (localStorage.getItem("user_id")) {
      window.location.href = "index.html";
    }

    function switchTab(tab) {
      const isLogin = tab === "login";
      document.getElementById("loginForm").classList.toggle("hidden", !isLogin);
      document.getElementById("registerForm").classList.toggle("hidden", isLogin);
      document.getElementById("forgotForm").classList.add("hidden");
      document.getElementById("tabLogin").classList.toggle("active", isLogin);
      document.getElementById("tabRegister").classList.toggle("active", !isLogin);
      clearError();
    }

    function showForgot(show) {
      document.getElementById("loginForm").classList.toggle("hidden", show);
      document.getElementById("forgotForm").classList.toggle("hidden", !show);
      document.querySelector(".auth-tabs").style.display = show ? "none" : "flex";
      clearError();
    }

    function showError(msg) {
      const el = document.getElementById("errorMsg");
      el.textContent = "⚠️ " + msg;
      el.classList.add("show");
    }
    function showSuccess(msg) {
      const el = document.getElementById("errorMsg");
      el.textContent = "✅ " + msg;
      el.style.color = "#4ade80";
      el.style.background = "rgba(74, 222, 128, 0.08)";
      el.style.borderColor = "rgba(74, 222, 128, 0.2)";
      el.classList.add("show");
    }
    function clearError() {
      const el = document.getElementById("errorMsg");
      el.classList.remove("show");
      el.style.color = "";
      el.style.background = "";
      el.style.borderColor = "";
    }

    function setLoading(btnId, loading, defaultText) {
      const btn = document.getElementById(btnId);
      if (!btn) return;
      btn.disabled = loading;
      btn.textContent = loading ? "Please wait..." : defaultText;
    }

    function togglePwd(id, btn) {
      const input = document.getElementById(id);
      const isText = input.type === "text";
      input.type = isText ? "password" : "text";
      btn.textContent = isText ? "👁️" : "🙈";
    }

    async function handleLogin(e) {
      e.preventDefault();
      clearError();
      const email = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value;

      setLoading("loginBtn", true, "Sign In →");
      try {
        const res = await api("/auth/login", "POST", { email, password });
        if (res.user_id) {
          localStorage.setItem("user_id", res.user_id);
          if (res.name) localStorage.setItem("user_name", res.name);

          // Check profile
          const profile = await api(`/profile/${res.user_id}`);
          if (profile && !profile.error) {
            localStorage.setItem("profile_setup", "true");
            window.location.href = "index.html";
          } else {
            window.location.href = "profile-setup.html";
          }
        } else {
          showError(res.error || "Login failed. Please try again.");
        }
      } catch (err) {
        showError("Cannot reach server. Make sure the backend is running.");
      } finally {
        setLoading("loginBtn", false, "Sign In →");
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      clearError();
      const name = document.getElementById("regName").value.trim();
      const email = document.getElementById("regEmail").value.trim();
      const dob = document.getElementById("regDob").value.trim();
      const password = document.getElementById("regPassword").value;

      setLoading("registerBtn", true, "Create Account →");
      try {
        // Clear old sessions
        localStorage.clear();

        const res = await api("/auth/register", "POST", {
          name, email, password,
          date_of_birth: dob || null,
          gender: "Not specified"
        });
        if (res.user_id) {
          localStorage.setItem("user_id", res.user_id);
          localStorage.setItem("user_name", name);
          window.location.href = "profile-setup.html";
        } else {
          showError(res.error || "Registration failed. Please try again.");
        }
      } catch (err) {
        showError("Cannot reach server. Make sure the backend is running.");
      } finally {
        setLoading("registerBtn", false, "Create Account →");
      }
    }

    async function handleForgot(e) {
      e.preventDefault();
      clearError();
      const email = document.getElementById("forgotEmail").value.trim();
      const new_password = document.getElementById("forgotNewPassword").value;

      setLoading("forgotBtn", true, "Reset Password");
      try {
        const res = await api("/auth/forgot-password", "POST", { email, new_password });
        if (res.message) {
          showSuccess("Password reset successful! You can now sign in.");
          setTimeout(() => showForgot(false), 2000);
        } else {
          showError(res.error || "Failed to reset password.");
        }
      } catch (err) {
        showError("Cannot reach server.");
      } finally {
        setLoading("forgotBtn", false, "Reset Password");
      }
    }
  </script>
</body>

</html>
